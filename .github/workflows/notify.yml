name: Resource Update Notification

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new files and send notification
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 scripts/notify_detect.py
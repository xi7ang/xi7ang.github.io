name: Resource Update Notification

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new files and send notification
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -x

          NOTIFY_LAST=".notify-last"
          BASELINE="$NOTIFY_LAST"

          # Detect or validate categories
          detect_categories() {
            find docs/public -maxdepth 1 -type d ! -name 'docs' ! -name 'public' ! -name '.git' | while read -r d; do
              basename "$d"
            done | sort
          }

          # Check if .notify-last is old SHA format (non-JSON)
          if [ -f "$NOTIFY_LAST" ]; then
            # Try to detect format: old SHA is 40 hex chars, JSON starts with '{'
            FIRST_CHAR=$(head -c 1 "$NOTIFY_LAST" 2>/dev/null)
            if [ "$FIRST_CHAR" != "{" ]; then
              echo "Legacy SHA format detected. Will re-initialize to line-based format."
              rm -f "$NOTIFY_LAST"
            fi
          fi

          # Initialize or load baseline
          if [ ! -f "$NOTIFY_LAST" ]; then
            echo "Initializing .notify-last for all categories..."
            > "$NOTIFY_LAST"

            for CAT in $(detect_categories); do
              # Find latest .md file in category directory
              LATEST_FILE=$(find "docs/public/$CAT" -maxdepth 1 -name '[0-9][0-9][0-9][0-9][0-9][0-9].md' -type f 2>/dev/null | sort | tail -1)
              if [ -n "$LATEST_FILE" ]; then
                TOTAL_LINES=$(wc -l < "$LATEST_FILE")
                python3 -c "
import json, sys
data = {}
try:
    with open('$NOTIFY_LAST', 'r') as f:
        data = json.load(f)
except: pass
data['$CAT'] = {'file': '$(basename $LATEST_FILE)', 'line': $TOTAL_LINES}
with open('$NOTIFY_LAST', 'w') as f:
    json.dump(data, f, indent=2)
"
                echo "Initialized $CAT: $(basename $LATEST_FILE), line $TOTAL_LINES"
              else
                echo "No .md files found for category: $CAT"
              fi
            done

            echo "Initialization complete."
            cat "$NOTIFY_LAST"
            echo "No new resources to notify this run."
            exit 0
          fi

          echo "Current baseline:"
          cat "$NOTIFY_LAST"
          echo "---"

          # Process each category
          CATEGORIES=$(python3 -c "
import json, sys
with open('$NOTIFY_LAST') as f:
    data = json.load(f)
for k in data: print(k)
")

          HAS_UPDATE=0
          JSON='[]'

          for CAT in $CATEGORIES; do
            BASELINE_INFO=$(python3 -c "
import json, sys
with open('$NOTIFY_LAST') as f:
    data = json.load(f)
print(json.dumps(data.get('$CAT', {})))
")

            BASELINE_FILE=$(echo "$BASELINE_INFO" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('file',''))")
            BASELINE_LINE=$(echo "$BASELINE_INFO" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('line',0))")

            if [ -z "$BASELINE_FILE" ]; then
              echo "No baseline for $CAT, skipping."
              continue
            fi

            echo "Processing $CAT: baseline=$(basename $BASELINE_FILE) line=$BASELINE_LINE"

            # Collect all .md files in category sorted ascending
            FILES=$(find "docs/public/$CAT" -maxdepth 1 -name '[0-9][0-9][0-9][0-9][0-9][0-9].md' -type f 2>/dev/null | sort)
            if [ -z "$FILES" ]; then
              echo "  No files found for $CAT"
              continue
            fi

            # Find baseline file position in sorted list
            BASELINE_PATH=""
            FOUND_BASELINE=0
            NEXT_FILE=""
            LINE_START=""

            declare -a FILE_ARRAY
            while IFS= read -r f; do
              FILE_ARRAY+=("$f")
            done <<< "$FILES"

            for i in "${!FILE_ARRAY[@]}"; do
              F="${FILE_ARRAY[$i]}"
              FNAME=$(basename "$F")
              if [ "$FNAME" = "$BASELINE_FILE" ]; then
                BASELINE_PATH="$F"
                FOUND_BASELINE=1
                # Next file exists?
                if [ $((i + 1)) -lt ${#FILE_ARRAY[@]} ]; then
                  NEXT_FILE="${FILE_ARRAY[$((i + 1))]}"
                fi
                break
              fi
            done

            if [ -z "$BASELINE_PATH" ]; then
              echo "  Baseline file $BASELINE_FILE not found in $CAT, skipping."
              continue
            fi

            echo "  Baseline: $BASELINE_FILE line $BASELINE_LINE, next file: ${NEXT_FILE:-(none)}"

            # Collect new lines starting from baseline
            NEW_LINES=""
            LAST_FILE=""
            LAST_LINE_NUM=0

            # Read from baseline file, starting at line (BASELINE_LINE + 1)
            if [ -f "$BASELINE_PATH" ]; then
              AFTER_LINES=$(tail -n +$((BASELINE_LINE + 1)) "$BASELINE_PATH" 2>/dev/null)
              if [ -n "$AFTER_LINES" ]; then
                TOTAL_LINES_B=$(wc -l < "$BASELINE_PATH")
                if [ $((BASELINE_LINE + 1)) -le $TOTAL_LINES_B ]; then
                  NEW_LINES="$AFTER_LINES"
                  LAST_FILE="$BASELINE_FILE"
                  LAST_LINE_NUM="$BASELINE_LINE"
                  echo "  Read $BASELINE_FILE from line $((BASELINE_LINE + 1)): $(echo "$AFTER_LINES" | wc -l) lines"
                fi
              fi
            fi

            # Read from next file(s) fully if they exist
            if [ -n "$NEXT_FILE" ]; then
              for NF in "${FILE_ARRAY[@]}"; do
                if [ -n "$NEXT_FILE" ] && [ "$NF" = "$NEXT_FILE" ]; then
                  NF_CONTENT=$(cat "$NF" 2>/dev/null)
                  if [ -n "$NF_CONTENT" ]; then
                    NEW_LINES="$NEW_LINES
$NF_CONTENT"
                    NBNAME=$(basename "$NF")
                    LAST_FILE="$NBNAME"
                    LAST_LINE_NUM=$(wc -l < "$NF")
                    echo "  Read full file $NBNAME: $(wc -l < "$NF") lines"
                    # Find next file after this one
                    FOUND_NEXT=0
                    for j in "${!FILE_ARRAY[@]}"; do
                      if [ $FOUND_NEXT -eq 1 ]; then
                        NEXT_FILE="${FILE_ARRAY[$j]}"
                        FOUND_NEXT=0
                        break
                      fi
                      if [ "${FILE_ARRAY[$j]}" = "$NF" ]; then
                        FOUND_NEXT=1
                      fi
                    done
                    if [ $FOUND_NEXT -eq 0 ]; then
                      NEXT_FILE=""
                    fi
                  fi
                fi
              done
            fi

            # Filter valid resource lines (starting with "- ")
            FILTERED_LINES=$(echo "$NEW_LINES" | grep -E '^[[:space:]]*-[[:space:]].' | sed 's/^[[:space:]]*//' | head -50)

            if [ -n "$FILTERED_LINES" ]; then
              HAS_UPDATE=1
              echo "  -> Found $(echo "$FILTERED_LINES" | wc -l) resource lines"

              ESCAPED=$(printf '%s\n' "$FILTERED_LINES" | python3 -c "
import json, sys
lines = [l.rstrip() for l in sys.stdin if l.strip()]
print(json.dumps({'category':'$CAT', 'file':'$LAST_FILE', 'lines': lines}))
")
              JSON=$(python3 -c "
import json, sys
arr = json.loads(sys.stdin.read())
n = json.loads('$ESCAPED')
arr.append(n)
print(json.dumps(arr))
" <<< "$JSON")
            else
              echo "  -> No new resource lines in $CAT"
            fi

            # Update .notify-last for this category
            python3 -c "
import json
with open('$NOTIFY_LAST') as f:
    data = json.load(f)
data['$CAT'] = {'file': '$LAST_FILE', 'line': $LAST_LINE_NUM}
with open('$NOTIFY_LAST', 'w') as f:
    json.dump(data, f, indent=2)
" 2>/dev/null

            echo "  Updated baseline: $LAST_FILE line $LAST_LINE_NUM"
            echo ""
          done

          if [ "$HAS_UPDATE" -eq 0 ]; then
            echo "No Resource Update, skipping."
            exit 0
          fi

          echo "Sending notification with payload:"
          echo "$JSON"
          python3 scripts/notify_email.py <<< "$JSON"

          # Commit updated baseline
          git add "$NOTIFY_LAST"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "chore: update notify baseline"
          git push
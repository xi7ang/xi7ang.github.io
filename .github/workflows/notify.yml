name: Resource Update Notification

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find last notify tag
        run: |
          TAG=$(git describe --tags --match 'notify-*' --sort=-version:refname 2>/dev/null | head -n1)
          echo "tag=${TAG:-none}" >> $GITHUB_OUTPUT
          echo "tag=${TAG:-none}" >> $GITHUB_ENV

      - name: Detect new files and send notification
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          LAST_TAG="${{ env.tag }}"
          if [ "$LAST_TAG" = "none" ]; then
            FILES=$(git log --since='7 days ago' --name-status --diff-filter=A --format='' | grep '^A\s.*docs/.*\.md$' | awk '{print $2}' | sort -u)
          else
            FILES=$(git diff $LAST_TAG..HEAD --name-status --diff-filter=A --format='' | grep '^A\s.*docs/.*\.md$' | awk '{print $2}' | sort -u)
          fi
          printf '%s\n' $FILES | grep 'docs/.*\.md$' > /tmp/new_files.txt
          COUNT=$(wc -l < /tmp/new_files.txt)
          if [ "$COUNT" -eq 0 ] || [ -z "$COUNT" ]; then
            echo "No new resources. Skipping."
            exit 0
          fi
          python3 scripts/notify_email.py /tmp/new_files.txt
          TAG="notify-$(date +%Y-%m-%d)"
          git tag -d "$TAG" 2>/dev/null || true
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -f -m "Notify sent $(date +%Y-%m-%d)"
          git push origin "$TAG" --force
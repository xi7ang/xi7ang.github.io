name: Resource Update Notification

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new files and send notification
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -x

          # Use .notify-last file to track last notified HEAD SHA
          LAST_SHA=$(cat .notify-last 2>/dev/null || echo "")
          CURRENT_SHA=$(git rev-parse HEAD)

          # Skip if already notified this exact commit
          if [ -n "$LAST_SHA" ] && [ "$CURRENT_SHA" = "$LAST_SHA" ]; then
            echo "Already notified for HEAD $CURRENT_SHA. Skipping."
            exit 0
          fi

          # Find last notify tag as baseline for diff (or use 7-day window if no tag)
          if LAST_TAG=$(git describe --tags --match 'notify-*' --sort=-version:refname 2>/dev/null) && [ -n "$LAST_TAG" ]; then
            FILES=$(git diff $LAST_TAG..HEAD --name-status --diff-filter=M --format='' | awk '{print $2}' | grep -E 'docs/public/.*/[0-9]{6}\.md$' | sort -u)
            BASELINE="$LAST_TAG"
          else
            FILES=$(git log --since='7 days ago' --name-status --diff-filter=M --format='' | awk '{print $2}' | grep -E 'docs/public/.*/[0-9]{6}\.md$' | sort -u)
            FIRST=$(git log --since='7 days ago' --format=%H --reverse -- docs/public 2>/dev/null | head -1)
            BASELINE="${FIRST:-HEAD~1}"
          fi

          if [ -z "$FILES" ]; then
            echo "No new resources. Skipping."
            # Record SHA even if no resources (avoid repeated empty runs)
            echo "$CURRENT_SHA" > .notify-last
            git add .notify-last
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git commit -m "chore: update notify last SHA (no resources)"
            git push
            exit 0
          fi

          # Extract newly added resource lines for each file
          JSON='[]'
          for FILE in $FILES; do
            CATEGORY=$(echo "$FILE" | cut -d/ -f3)
            LINES=$(git diff $BASELINE..HEAD -- "$FILE" | grep '^+- ' | sed 's/^+- //' | head -15)
            if [ -n "$LINES" ]; then
              ESCAPED_LINES=$(printf '%s\n' "$LINES" | python3 -c "import json,sys; lines=[l.rstrip() for l in sys.stdin if l.strip()]; print(json.dumps({'category':'$CATEGORY','file':'$FILE','lines':lines}))")
              JSON=$(python3 -c "import json,sys; arr=json.loads(sys.stdin.read()); n=json.loads('$ESCAPED_LINES'); arr.append(n); print(json.dumps(arr))" <<< "$JSON")
            fi
          done

          python3 scripts/notify_email.py <<< "$JSON"

          # Record notified SHA and push tag
          echo "$CURRENT_SHA" > .notify-last
          TAG="notify-$(date +%Y-%m-%d)"
          git add .notify-last
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "chore: update notify last SHA"
          git tag -a "$TAG" -f -m "Notify sent $(date +%Y-%m-%d)"
          git push origin "$TAG" --force
          git push